workflows:
  amgi-ios:
    name: Amgi iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        SCHEME: "AnkiApp"
    scripts:
      - name: 1. 环境准备与依赖安装
        script: |
          # 安装二进制工具
          brew install protobuf swift-protobuf xcodegen
          
          # 重新配置 Rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          
          # 【关键修改】：只保留真机(aarch64)和现代M芯片模拟器(aarch64-sim)
          # 删掉了会导致报错的 x86_64 目标
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: 2. 初始化子模块
        script: |
          git submodule update --init --recursive

      - name: 3. 编译 Rust XCFramework
        script: |
          source $HOME/.cargo/env
          # 注意：如果 build-xcframework.sh 脚本内部强行写了要编 x86_64，
          # 这一步可能还会报错。但我们先尝试跳过环境检查。
          chmod +x ./scripts/build-xcframework.sh
          ./scripts/build-xcframework.sh

      - name: 4. 生成 Proto 协议文件
        script: |
          chmod +x ./scripts/generate-protos.sh
          ./scripts/generate-protos.sh

      - name: 5. 生成 Xcode 项目
        script: |
          cd AnkiApp && xcodegen generate

      - name: 6. 编译并存档 (Archive)
        script: |
          xcodebuild archive \
            -project AnkiApp/AnkiApp.xcodeproj \
            -scheme "$SCHEME" \
            -archivePath $CM_BUILD_DIR/AmgiApp.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO

      - name: 7. 打包 IPA
        script: |
          mkdir -p Payload
          APP_PATH=$(find $CM_BUILD_DIR/AmgiApp.xcarchive -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r amgi_unsigned.ipa Payload
          
    artifacts:
      - "*.ipa"
